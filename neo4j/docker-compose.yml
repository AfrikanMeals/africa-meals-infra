# Wise Eat — Neo4j Community (reco / graphe, pas SoT)
# Install : sudo ./install.sh neo4j
# Bolt : bolt://127.0.0.1:7687 · Browser : http://127.0.0.1:7474
# Admin public : sudo ./install.sh neo4j-admin → https://db-graph.wise-eat.com
# Budget : 1 Go RAM conteneur · volume données 5 Go (loop)

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG:-5.26-community}
    container_name: wise-eat-neo4j
    restart: unless-stopped
    mem_limit: ${NEO4J_MEM_LIMIT:-1g}
    memswap_limit: ${NEO4J_MEMSWAP_LIMIT:-1280m}
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD requis}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-256m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-128m}
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      # TLS Bolt terminé par nginx stream (:7688) — Bolt interne en clair
      NEO4J_server_bolt_tls__level: DISABLED
      # API/k3s : bolt://host.k3s.internal:7687 (direct). Browser public : bolt+s://db-graph:7688
      NEO4J_server_bolt_advertised__address: ${NEO4J_BOLT_ADVERTISED:-localhost:7687}
      NEO4J_server_http_advertised__address: ${NEO4J_HTTP_ADVERTISED:-localhost:7474}
      # browser.allow_outgoing_connections retiré : non reconnu en 5.26+ (strict_validation)
      NEO4J_PLUGINS: ${NEO4J_PLUGINS:-[]}
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ${NEO4J_DATA_DIR:-/var/lib/wise-eat/neo4j}/data:/data
      - ${NEO4J_DATA_DIR:-/var/lib/wise-eat/neo4j}/logs:/logs
      - ${NEO4J_DATA_DIR:-/var/lib/wise-eat/neo4j}/import:/var/lib/neo4j/import
      - ${NEO4J_DATA_DIR:-/var/lib/wise-eat/neo4j}/plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:7474 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      com.wise-eat.service: neo4j
      com.wise-eat.component: graph
    networks:
      - wise-eat-infra
