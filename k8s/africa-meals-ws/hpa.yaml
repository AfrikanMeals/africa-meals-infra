apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: africa-meals-ws
  namespace: wise-eat
  labels:
    app.kubernetes.io/name: africa-meals-ws
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: africa-meals-ws
  minReplicas: 3
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
