apiVersion: apps/v1
kind: Deployment
metadata:
  name: africa-meals-api
  namespace: wise-eat
  labels:
    app.kubernetes.io/name: africa-meals-api
    app.kubernetes.io/component: api
spec:
  replicas: 5
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 900
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: africa-meals-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: africa-meals-api
        app.kubernetes.io/component: api
    spec:
      restartPolicy: Always
      serviceAccountName: africa-meals-api
      terminationGracePeriodSeconds: 90
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: africa-meals-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: africa-meals-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: africa-meals/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: grpc
              containerPort: 50052
              protocol: TCP
          env:
            - name: NODE_PORT
              value: "9000"
            - name: PORT
              value: "9000"
            - name: NODE_ENV
              value: production
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REQUEST_STATS_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: africa-meals-api-env
            - configMapRef:
                name: africa-meals-api
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: firebase-sa
              mountPath: /run/secrets/firebase
              readOnly: true
            - name: recaptcha-sa
              mountPath: /run/secrets/recaptcha
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 15
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 8
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
      volumes:
        - name: firebase-sa
          secret:
            secretName: africa-meals-api-firebase-sa
            optional: true
        - name: recaptcha-sa
          secret:
            secretName: africa-meals-api-recaptcha-sa
            optional: true
