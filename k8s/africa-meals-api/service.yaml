apiVersion: v1
kind: Service
metadata:
  name: africa-meals-api
  namespace: wise-eat
  labels:
    app.kubernetes.io/name: africa-meals-api
    app.kubernetes.io/component: api
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: africa-meals-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
    - name: http
      port: 9000
      targetPort: http
      nodePort: 30900
      protocol: TCP
