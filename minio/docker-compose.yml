# Wise Eat — MinIO (stockage S3-compatible pour médias)
# Install : sudo ./install.sh minio
# API locale : http://127.0.0.1:9000 · Public : https://storage.wise-eat.com

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: wise-eat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER requis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requis}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://storage.wise-eat.com}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://cdn.wise-eat.com}
      # Métriques Prometheus (réseau Docker wise-eat-infra uniquement)
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data}:/data
    restart: unless-stopped
    networks:
      wise-eat-minio: {}
      wise-eat-infra:
        aliases:
          - wise-eat-minio
          - minio

networks:
  wise-eat-minio:
    name: wise-eat-minio
  wise-eat-infra:
    name: wise-eat-infra
    external: true
