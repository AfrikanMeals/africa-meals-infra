# Wise Eat — MinIO (stockage S3-compatible pour médias)
# Install : sudo ./install.sh minio
# API : http://127.0.0.1:9000 · Console : http://127.0.0.1:9001

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: wise-eat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER requis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requis}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - wise-eat-minio

networks:
  wise-eat-minio:
    name: wise-eat-minio
