# Wise Eat — monitoring (Prometheus + Grafana + redis_exporter + memcached_exporter)
# Install : sudo ./install.sh monitoring
#
# Les exporters joignent Redis/Memcached via le réseau Docker wise-eat-infra
# (host.docker.internal:6379 échoue quand Redis n’écoute que sur 127.0.0.1).

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  redis-exporter-cache:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
      REDIS_EXPORTER_CHECK_KEYS: ""
      REDIS_EXPORTER_IS_TILE38: "false"
    ports:
      - "127.0.0.1:9121:9121"

  redis-exporter-bullmq:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9122:9121"

  memcached-exporter:
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached:11211'
    ports:
      - "127.0.0.1:9150:9150"

  redis-exporter-cache-replica:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache-replica
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache-replica:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9123:9121"

  redis-exporter-bullmq-replica:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq-replica
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq-replica:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9124:9121"

  memcached-exporter-b:
    profiles: ["cluster-b"]
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter-b
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached-b:11211'
    ports:
      - "127.0.0.1:9151:9150"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: wise-eat-prometheus
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://127.0.0.1:9090/}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - redis-exporter-cache
      - redis-exporter-bullmq
      - memcached-exporter

  grafana:
    image: grafana/grafana:13.1.0
    container_name: wise-eat-grafana
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requis}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3000/}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
