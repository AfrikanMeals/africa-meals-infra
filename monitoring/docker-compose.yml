# Wise Eat — monitoring (Prometheus + Grafana + exporters + node_exporter VPS)

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: wise-eat-node-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.pressure
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: wise-eat-cadvisor
    restart: unless-stopped
    privileged: true
    networks:
      - wise-eat-infra
    command:
      - --docker_only=true
      - --store_container_labels=true
      - --whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service,com.docker.compose.config-hash
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8088:8080"

  redis-exporter-cache:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
      REDIS_EXPORTER_CHECK_KEYS: ""
      REDIS_EXPORTER_IS_TILE38: "false"
    ports:
      - "127.0.0.1:9121:9121"

  redis-exporter-bullmq:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9122:9121"

  memcached-exporter:
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached:11211'
    ports:
      - "127.0.0.1:9150:9150"

  redis-exporter-cache-replica-1:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache-replica-1:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9123:9121"

  redis-exporter-cache-replica-2:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache-replica-2:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9125:9121"

  redis-exporter-bullmq-replica-1:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq-replica-1:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9124:9121"

  redis-exporter-bullmq-replica-2:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq-replica-2:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9126:9121"

  memcached-exporter-replica-1:
    profiles: ["cluster-b"]
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached-replica-1:11211'
    ports:
      - "127.0.0.1:9151:9150"

  memcached-exporter-replica-2:
    profiles: ["cluster-b"]
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached-replica-2:11211'
    ports:
      - "127.0.0.1:9152:9150"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: wise-eat-prometheus
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://127.0.0.1:9090/}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - node-exporter
      - cadvisor
      - redis-exporter-cache
      - redis-exporter-bullmq
      - memcached-exporter

  grafana:
    image: grafana/grafana:13.1.0
    container_name: wise-eat-grafana
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requis}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3000/}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
