# Wise Eat — monitoring (Prometheus + Grafana + exporters + node_exporter VPS)

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: wise-eat-node-exporter
    restart: unless-stopped
    # host : évite les mappings port Docker cassés (Prometheus scrape 127.0.0.1:9100)
    network_mode: host
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --web.listen-address=127.0.0.1:9100
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.pressure
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    # v0.54+ requis pour Docker 29 + containerd-snapshotter (overlayfs) — PR #3709
    image: ghcr.io/google/cadvisor:v0.60.2
    container_name: wise-eat-cadvisor
    restart: unless-stopped
    privileged: true
    # host : évite les mappings port Docker cassés (Prometheus scrape 127.0.0.1:8088)
    network_mode: host
    # cgroup v2 : namespace hôte requis pour lire les stats des autres conteneurs
    cgroup: host
    command:
      - --port=8088
      - --listen_ip=127.0.0.1
      - --docker_only=true
      - --store_container_labels=true
      - --housekeeping_interval=10s
      # Docker 29 + overlayfs : sans ceci cAdvisor ne remonte que id="/" (cadvisor#3860)
      - --disable_metrics=disk
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  ollama-exporter:
    image: ghcr.io/maravexa/ollama-exporter:latest
    container_name: wise-eat-ollama-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      OLLAMA_URL: http://wise-eat-ollama:11434
    command:
      - --config=/etc/ollama-exporter/ollama-exporter.yml
    volumes:
      - ./ollama-exporter/ollama-exporter.yml:/etc/ollama-exporter/ollama-exporter.yml:ro
    ports:
      - "127.0.0.1:9400:9400"
      - "127.0.0.1:9401:9401"

  redis-exporter-cache:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
      REDIS_EXPORTER_CHECK_KEYS: ""
      REDIS_EXPORTER_IS_TILE38: "false"
    ports:
      - "127.0.0.1:9121:9121"

  redis-exporter-bullmq:
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9122:9121"

  memcached-exporter:
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached:11211'
    ports:
      - "127.0.0.1:9150:9150"

  redis-exporter-cache-replica-1:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache-replica-1:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9123:9121"

  redis-exporter-cache-replica-2:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-cache-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-cache-replica-2:6379
      REDIS_USER: wise-eat-cache
      REDIS_PASSWORD: ${CACHE_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9125:9121"

  redis-exporter-bullmq-replica-1:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq-replica-1:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9124:9121"

  redis-exporter-bullmq-replica-2:
    profiles: ["cluster-b"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: wise-eat-redis-exporter-bullmq-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    environment:
      REDIS_ADDR: redis://wise-eat-redis-bullmq-replica-2:6379
      REDIS_USER: wise-eat-bull
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD}
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9126:9121"

  memcached-exporter-replica-1:
    profiles: ["cluster-b"]
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter-replica-1
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached-replica-1:11211'
    ports:
      - "127.0.0.1:9151:9150"

  memcached-exporter-replica-2:
    profiles: ["cluster-b"]
    image: prom/memcached-exporter:v0.15.3
    container_name: wise-eat-memcached-exporter-replica-2
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--memcached.address=wise-eat-memcached-replica-2:11211'
    ports:
      - "127.0.0.1:9152:9150"

  mongodb-exporter:
    image: percona/mongodb_exporter:0.44.0
    container_name: wise-eat-mongodb-exporter
    restart: unless-stopped
    networks:
      - wise-eat-infra
    command:
      - '--mongodb.uri=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@wise-eat-mongo-1:27017/admin?authSource=admin&directConnection=true'
      - '--mongodb.direct-connect'
      - '--mongodb.global-conn-pool'
      - '--mongodb.connect-timeout-ms=10000'
      - '--compatible-mode'
      # Collecteurs ciblés (--collect-all + discovering-mode dépasse le scrape_timeout → mongodb_up seul).
      - '--collector.diagnosticdata'
      - '--collector.replicasetstatus'
      - '--collector.dbstats'
      - '--collector.topmetrics'
      - '--log.level=warn'
    ports:
      - "127.0.0.1:9216:9216"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: wise-eat-prometheus
    restart: unless-stopped
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-512m}
    memswap_limit: ${PROMETHEUS_MEMSWAP_LIMIT:-768m}
    # host : scrape k3s NodePort + IP pods sans passerelle Docker (VPS Wise Eat)
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
      # 0.0.0.0 : Grafana (Docker) joint via host.docker.internal → IP pont hôte, pas 127.0.0.1
      - --web.listen-address=0.0.0.0:9090
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://127.0.0.1:9090/}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    depends_on:
      - node-exporter
      - cadvisor
      - ollama-exporter
      - redis-exporter-cache
      - redis-exporter-bullmq
      - memcached-exporter

  grafana:
    image: grafana/grafana:13.1.0
    container_name: wise-eat-grafana
    restart: unless-stopped
    mem_limit: ${GRAFANA_MEM_LIMIT:-256m}
    memswap_limit: ${GRAFANA_MEMSWAP_LIMIT:-384m}
    # host : joint Prometheus (host network, 0.0.0.0:9090) via 127.0.0.1 — host.docker.internal absent sur Linux sans recreate
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requis}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: 127.0.0.1
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3000/}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-true}
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-smtp.zoho.com:587}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-admin@wise-eat.com}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS:-admin@wise-eat.com}
      GF_SMTP_FROM_NAME: ${GRAFANA_SMTP_FROM_NAME:-Wise Eat Alerts}
      GF_SMTP_SKIP_VERIFY: ${GRAFANA_SMTP_SKIP_VERIFY:-false}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
