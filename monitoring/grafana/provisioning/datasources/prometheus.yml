apiVersion: 1

# Force la datasource correcte (volume Grafana peut garder une URL obsolète → tout N/A).
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # Prometheus en network_mode=host (0.0.0.0:9090) — Grafana idem (127.0.0.1)
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
