global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

# Prometheus tourne en network_mode=host (docker-compose + recreate-prometheus-host.sh).
# Les exporters publient sur 127.0.0.1 — ne pas utiliser les noms DNS Docker (node-exporter, cadvisor…).
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Métriques hôte Ubuntu (dashboard Grafana Node Exporter Full #1860)
  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:9100

  # Conteneurs Docker (dashboard Grafana #4271 — cAdvisor host :8088 → conteneur :8080)
  - job_name: cadvisor
    static_configs:
      - targets: ['127.0.0.1:8088']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:8080

  - job_name: redis-cache
    static_configs:
      - targets: ['127.0.0.1:9121']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: cache
          redis_port: '6379'

  - job_name: redis-bullmq
    static_configs:
      - targets: ['127.0.0.1:9122']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: bullmq
          redis_port: '6380'

  - job_name: memcached
    static_configs:
      - targets: ['127.0.0.1:9150']
        labels:
          namespace: wise-eat
          memcached_role: primary
          memcached_port: '11211'

  - job_name: redis-cache-replica-1
    static_configs:
      - targets: ['127.0.0.1:9123']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: cache
          redis_port: '6371'

  - job_name: redis-cache-replica-2
    static_configs:
      - targets: ['127.0.0.1:9125']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: cache
          redis_port: '6372'

  - job_name: redis-bullmq-replica-1
    static_configs:
      - targets: ['127.0.0.1:9124']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: bullmq
          redis_port: '6390'

  - job_name: redis-bullmq-replica-2
    static_configs:
      - targets: ['127.0.0.1:9126']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: bullmq
          redis_port: '6391'

  - job_name: memcached-replica-1
    static_configs:
      - targets: ['127.0.0.1:9151']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '1'
          memcached_port: '11213'

  - job_name: memcached-replica-2
    static_configs:
      - targets: ['127.0.0.1:9152']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '2'
          memcached_port: '11214'

  # MinIO — API locale 127.0.0.1:9000 (NE PAS scraper host.docker.internal:9000 : Nest écoute aussi :9000).
  - job_name: minio-cluster
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['127.0.0.1:9000']
        labels:
          namespace: wise-eat
          storage_engine: minio
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-minio:9000

  - job_name: minio-node
    metrics_path: /minio/v2/metrics/node
    scheme: http
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['127.0.0.1:9000']
        labels:
          namespace: wise-eat
          storage_engine: minio
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-minio:9000

  # EMQX — primary sur localhost ; réplicas via file_sd (IP Docker, sync-emqx-prometheus-targets.sh)
  - job_name: emqx
    metrics_path: /api/v5/prometheus/stats
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['127.0.0.1:18083']
        labels:
          namespace: wise-eat
          emqx_role: primary
          emqx_scrape: wise-eat-emqx-1
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/emqx-docker.json
        refresh_interval: 60s
    metric_relabel_configs:
      # Unifie instance pour Grafana (sinon emqx~IP vs wise-eat-emqx-N:18083).
      - source_labels: [emqx_scrape]
        target_label: instance
        regex: (.+)
        replacement: ${1}:18083

  # MongoDB — Percona exporter (connexion directe au primary ; scrape lent)
  - job_name: mongodb
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['127.0.0.1:9216']
        labels:
          namespace: wise-eat
          mongo_role: cluster
          mongo_scrape: wise-eat-mongodb-exporter
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-mongo-1:27017

  # Neo4j Community — PapaDanielVi/neo4j-exporter (Bolt ; Grafana Neo4j/)
  - job_name: neo4j
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['127.0.0.1:9217']
        labels:
          namespace: wise-eat
          service: neo4j
          neo4j_scrape: wise-eat-neo4j-exporter
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-neo4j:7687

  # HAProxy — exporter Prometheus intégré (stats :8404/metrics)
  - job_name: haproxy
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8404']
        labels:
          namespace: wise-eat
          service: haproxy

  # Ollama — maravexa/ollama-exporter (Grafana dashboard #25086, job=ollama)
  - job_name: ollama
    scrape_interval: 15s
    static_configs:
      - targets: ['127.0.0.1:9400']
        labels:
          namespace: wise-eat
          service: ollama
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-ollama:11434

  # k8s — kube-state-metrics (NodePort 30080 sur l'hôte)
  - job_name: kube-state-metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['127.0.0.1:30080']
        labels:
          namespace: kube-system
          service: kube-state-metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/k8s-host.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        regex: '[^:]+:30080'
        action: keep
      - target_label: instance
        replacement: wise-eat-k8s:30080

  # africa-meals-ws — métriques applicatives par pod (STOMP, WS, gRPC, MQTT)
  - job_name: africa-meals-ws-pods
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/ws-pods.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [pod]
        target_label: pod
      - source_labels: [__address__]
        target_label: instance

  # Sonde agrégée NodePort (fallback si file_sd ws-pods vide)
  - job_name: africa-meals-ws-nodeport
    metrics_path: /api/metrics
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/k8s-host.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        regex: '[^:]+:30800'
        action: keep
      - target_label: instance
        replacement: ws-nodeport:30800

  # africa-meals-api — métriques applicatives par pod (HTTP, GraphQL, BullMQ)
  - job_name: africa-meals-api-pods
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/api-pods.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [pod]
        target_label: pod
      - source_labels: [__address__]
        target_label: instance

  - job_name: africa-meals-api-nodeport
    metrics_path: /api/metrics
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/k8s-host.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        regex: '[^:]+:30900'
        action: keep
      - target_label: instance
        replacement: api-nodeport:30900
