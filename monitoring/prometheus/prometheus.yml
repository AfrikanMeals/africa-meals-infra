global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: redis-cache
    static_configs:
      - targets: ['redis-exporter-cache:9121']
        labels:
          namespace: wise-eat
          redis_instance: cache
          redis_port: '6379'

  - job_name: redis-bullmq
    static_configs:
      - targets: ['redis-exporter-bullmq:9121']
        labels:
          namespace: wise-eat
          redis_instance: bullmq
          redis_port: '6380'
