global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Métriques hôte Ubuntu (dashboard Grafana Node Exporter Full #1860)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:9100

  # Conteneurs Docker (dashboard Grafana #4271 — avec node_exporter ci-dessus)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:8080

  - job_name: redis-cache
    static_configs:
      - targets: ['redis-exporter-cache:9121']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: cache
          redis_port: '6379'

  - job_name: redis-bullmq
    static_configs:
      - targets: ['redis-exporter-bullmq:9121']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: bullmq
          redis_port: '6380'

  - job_name: memcached
    static_configs:
      - targets: ['memcached-exporter:9150']
        labels:
          namespace: wise-eat
          memcached_role: primary
          memcached_port: '11211'

  - job_name: redis-cache-replica-1
    static_configs:
      - targets: ['redis-exporter-cache-replica-1:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: cache
          redis_port: '6371'

  - job_name: redis-cache-replica-2
    static_configs:
      - targets: ['redis-exporter-cache-replica-2:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: cache
          redis_port: '6372'

  - job_name: redis-bullmq-replica-1
    static_configs:
      - targets: ['redis-exporter-bullmq-replica-1:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: bullmq
          redis_port: '6390'

  - job_name: redis-bullmq-replica-2
    static_configs:
      - targets: ['redis-exporter-bullmq-replica-2:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: bullmq
          redis_port: '6391'

  - job_name: memcached-replica-1
    static_configs:
      - targets: ['memcached-exporter-replica-1:9150']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '1'
          memcached_port: '11213'

  - job_name: memcached-replica-2
    static_configs:
      - targets: ['memcached-exporter-replica-2:9150']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '2'
          memcached_port: '11214'

  # MinIO — scrape via réseau Docker (NE PAS utiliser host.docker.internal:9000 :
  # l'API Nest écoute sur 0.0.0.0:9000 et répond 404 à /minio/v2/metrics/cluster).
  # Deux jobs distincts (noms uniques Prometheus) ; Grafana filtre minio-cluster|minio-node.
  - job_name: minio-cluster
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['wise-eat-minio:9000']
        labels:
          namespace: wise-eat
          storage_engine: minio
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-minio:9000

  - job_name: minio-node
    metrics_path: /minio/v2/metrics/node
    scheme: http
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['wise-eat-minio:9000']
        labels:
          namespace: wise-eat
          storage_engine: minio
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-minio:9000

  # EMQX — /api/v5/prometheus/stats (primary + réplicas, réseau wise-eat-infra)
  - job_name: emqx
    metrics_path: /api/v5/prometheus/stats
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['wise-eat-emqx-1:18083']
        labels:
          namespace: wise-eat
          emqx_role: primary
          emqx_scrape: wise-eat-emqx-1
      - targets: ['wise-eat-emqx-2:18083']
        labels:
          namespace: wise-eat
          emqx_role: replica
          emqx_replica: '1'
          emqx_scrape: wise-eat-emqx-2
      - targets: ['wise-eat-emqx-3:18083']
        labels:
          namespace: wise-eat
          emqx_role: replica
          emqx_replica: '2'
          emqx_scrape: wise-eat-emqx-3
    metric_relabel_configs:
      # Unifie instance pour Grafana (sinon emqx~IP vs wise-eat-emqx-N:18083).
      - source_labels: [emqx_scrape]
        target_label: instance
        regex: (.+)
        replacement: ${1}:18083

  # MongoDB — Percona exporter (connexion directe au primary)
  - job_name: mongodb
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['mongodb-exporter:9216']
        labels:
          namespace: wise-eat
          mongo_role: cluster
          mongo_scrape: wise-eat-mongodb-exporter
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-mongo-1:27017
