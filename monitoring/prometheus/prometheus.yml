global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Métriques hôte Ubuntu (dashboard Grafana Node Exporter Full #1860)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:9100

  # Conteneurs Docker (dashboard Grafana #4271 — avec node_exporter ci-dessus)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          namespace: wise-eat
          host_role: vps
    relabel_configs:
      - target_label: instance
        replacement: wise-eat:8080

  - job_name: redis-cache
    static_configs:
      - targets: ['redis-exporter-cache:9121']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: cache
          redis_port: '6379'

  - job_name: redis-bullmq
    static_configs:
      - targets: ['redis-exporter-bullmq:9121']
        labels:
          namespace: wise-eat
          redis_role: primary
          redis_instance: bullmq
          redis_port: '6380'

  - job_name: memcached
    static_configs:
      - targets: ['memcached-exporter:9150']
        labels:
          namespace: wise-eat
          memcached_role: primary
          memcached_port: '11211'

  - job_name: redis-cache-replica-1
    static_configs:
      - targets: ['redis-exporter-cache-replica-1:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: cache
          redis_port: '6371'

  - job_name: redis-cache-replica-2
    static_configs:
      - targets: ['redis-exporter-cache-replica-2:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: cache
          redis_port: '6372'

  - job_name: redis-bullmq-replica-1
    static_configs:
      - targets: ['redis-exporter-bullmq-replica-1:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '1'
          redis_instance: bullmq
          redis_port: '6390'

  - job_name: redis-bullmq-replica-2
    static_configs:
      - targets: ['redis-exporter-bullmq-replica-2:9121']
        labels:
          namespace: wise-eat
          redis_role: replica
          redis_replica: '2'
          redis_instance: bullmq
          redis_port: '6391'

  - job_name: memcached-replica-1
    static_configs:
      - targets: ['memcached-exporter-replica-1:9150']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '1'
          memcached_port: '11213'

  - job_name: memcached-replica-2
    static_configs:
      - targets: ['memcached-exporter-replica-2:9150']
        labels:
          namespace: wise-eat
          memcached_role: replica
          memcached_replica: '2'
          memcached_port: '11214'

  # MinIO cluster (dashboard Grafana #20826 / Prometheus #25202)
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ['wise-eat-minio:9000']
        labels:
          namespace: wise-eat
          storage_engine: minio
    relabel_configs:
      - target_label: instance
        replacement: wise-eat-minio:9000
