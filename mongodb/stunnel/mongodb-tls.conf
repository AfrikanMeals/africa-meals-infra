; TLS front-end MongoDB primary — Let's Encrypt db.wise-eat.com
; Install : sudo ./install.sh mongodb-tls
[mongodb-tls]
accept = 27018
connect = 127.0.0.1:27017
cert = /etc/stunnel/mongodb/fullchain.pem
key = /etc/stunnel/mongodb/privkey.pem

; IPv6 explicite (Linux bindv6only=1)
[mongodb-tls-v6]
accept = :::27018
connect = 127.0.0.1:27017
cert = /etc/stunnel/mongodb/fullchain.pem
key = /etc/stunnel/mongodb/privkey.pem
