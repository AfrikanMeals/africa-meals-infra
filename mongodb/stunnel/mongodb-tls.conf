; TLS front-end MongoDB primary — Let's Encrypt db.wise-eat.com
; Install : sudo ./install.sh mongodb-tls
; IPv4 explicite (0.0.0.0) — requis pour pods k3s via cni0 (évite ::ffff: + ECONNRESET).
; IPv6 :::PORT — nécessite net.ipv6.bindv6only=1 (sinon conflit avec 0.0.0.0).
[mongodb-tls]
accept = 0.0.0.0:27018
connect = 127.0.0.1:27017
cert = /etc/stunnel/mongodb/fullchain.pem
key = /etc/stunnel/mongodb/privkey.pem

[mongodb-tls-v6]
accept = :::27018
connect = 127.0.0.1:27017
cert = /etc/stunnel/mongodb/fullchain.pem
key = /etc/stunnel/mongodb/privkey.pem
