# Wise Eat — MongoDB 8 : 1 primary + 2 réplicas (replica set rs0)
# Install : sudo ./install.sh mongodb
# RAM : 512 Mo / nœud + swap (1,5 Go total rs0) · Stockage : 5 Go (volume dédié)

name: wise-eat-mongo

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

x-mongo-common: &mongo-common
  image: mongo:8.0
  restart: unless-stopped
  networks:
    - wise-eat-infra
  command:
    - mongod
    - --replSet
    - ${MONGO_REPLICA_SET:-rs0}
    - --bind_ip_all
    - --keyFile
    - /etc/mongodb/keyfile
    - --wiredTigerCacheSizeGB
    - ${MONGO_WIREDTIGER_CACHE_GB:-0.125}
    - --setParameter
    - authenticationMechanisms=SCRAM-SHA-256
  mem_limit: ${MONGO_MEM_LIMIT:-512m}
  memswap_limit: ${MONGO_MEMSWAP_LIMIT:-1g}
  healthcheck:
    test:
      [
        "CMD",
        "mongosh",
        "--quiet",
        "--eval",
        "db.adminCommand('ping').ok",
      ]
    interval: 15s
    timeout: 10s
    retries: 8
    start_period: 60s

services:
  mongo-1:
    <<: *mongo-common
    container_name: wise-eat-mongo-1
    hostname: wise-eat-mongo-1
    networks:
      wise-eat-infra:
        aliases:
          - wise-eat-mongo-1
          - mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER requis}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD requis}
    ports:
      - "127.0.0.1:${MONGO_PRIMARY_PORT:-27017}:27017"
    volumes:
      - ${MONGO_DATA_1:-./data-mongo-1}:/data/db
      - ./keyfile:/etc/mongodb/keyfile:ro

  mongo-2:
    <<: *mongo-common
    container_name: wise-eat-mongo-2
    hostname: wise-eat-mongo-2
    depends_on:
      mongo-1:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MONGO_REPLICA_1_PORT:-27027}:27017"
    volumes:
      - ${MONGO_DATA_2:-./data-mongo-2}:/data/db
      - ./keyfile:/etc/mongodb/keyfile:ro

  mongo-3:
    <<: *mongo-common
    container_name: wise-eat-mongo-3
    hostname: wise-eat-mongo-3
    depends_on:
      mongo-1:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MONGO_REPLICA_2_PORT:-27028}:27017"
    volumes:
      - ${MONGO_DATA_3:-./data-mongo-3}:/data/db
      - ./keyfile:/etc/mongodb/keyfile:ro

  dbgate:
    image: dbgate/dbgate:6.8.2
    container_name: wise-eat-dbgate
    restart: unless-stopped
    networks:
      - wise-eat-infra
    depends_on:
      mongo-1:
        condition: service_healthy
    environment:
      CONNECTIONS: wiseeat
      LABEL_wiseeat: Wise Eat MongoDB
      URL_wiseeat: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@wise-eat-mongo-1:27017/admin?authSource=admin&directConnection=true
      ENGINE_wiseeat: mongo@dbgate-plugin-mongo
      # Auth web gérée par nginx (basic auth) sur data.wise-eat.com
      SKIP_ALL_AUTH: "1"
      SHELL_CONNECTION: "0"
      SHELL_SCRIPTING: "0"
      LOG_LEVEL: warn
    volumes:
      - ${MONGO_DBGATE_DATA:-./data-dbgate}:/root/.dbgate
    mem_limit: ${MONGO_DBGATE_MEM_LIMIT:-512m}
    ports:
      - "127.0.0.1:${MONGO_DBGATE_PORT:-8081}:3000"
