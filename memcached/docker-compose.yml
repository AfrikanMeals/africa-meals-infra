# Wise Eat — Memcached : 1 primary + 2 réplicas (pools standby, profile cluster-b)
# MEMCACHED_CLUSTER_B_ENABLED=true dans .env.memcached

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

x-memcached-mem: &memcached-mem
  mem_limit: ${MEMCACHED_MEM_LIMIT:-192m}
  memswap_limit: ${MEMCACHED_MEMSWAP_LIMIT:-256m}

services:
  memcached:
    <<: *memcached-mem
    image: memcached:1.6-alpine
    container_name: wise-eat-memcached
    networks:
      - wise-eat-infra
    command:
      - -m
      - "${MEMCACHED_MEMORY_MB:-128}"
      - -I
      - "${MEMCACHED_MAX_ITEM_MB:-2}m"
      - -c
      - "${MEMCACHED_MAX_CONNECTIONS:-1024}"
    ports:
      - "127.0.0.1:${MEMCACHED_PORT:-11211}:11211"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${MEMCACHED_PORT:-11211}:11211"
    restart: unless-stopped

  memcached-replica-1:
    <<: *memcached-mem
    profiles: ["cluster-b"]
    image: memcached:1.6-alpine
    container_name: wise-eat-memcached-replica-1
    networks:
      - wise-eat-infra
    command:
      - -m
      - "${MEMCACHED_REPLICA_MEMORY_MB:-128}"
      - -I
      - "${MEMCACHED_MAX_ITEM_MB:-2}m"
      - -c
      - "${MEMCACHED_MAX_CONNECTIONS:-1024}"
    ports:
      - "127.0.0.1:${MEMCACHED_REPLICA_1_PORT:-11213}:11211"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${MEMCACHED_REPLICA_1_PORT:-11213}:11211"
    restart: unless-stopped

  memcached-replica-2:
    <<: *memcached-mem
    profiles: ["cluster-b"]
    image: memcached:1.6-alpine
    container_name: wise-eat-memcached-replica-2
    networks:
      - wise-eat-infra
    command:
      - -m
      - "${MEMCACHED_REPLICA_MEMORY_MB:-128}"
      - -I
      - "${MEMCACHED_MAX_ITEM_MB:-2}m"
      - -c
      - "${MEMCACHED_MAX_CONNECTIONS:-1024}"
    ports:
      - "127.0.0.1:${MEMCACHED_REPLICA_2_PORT:-11214}:11211"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${MEMCACHED_REPLICA_2_PORT:-11214}:11211"
    restart: unless-stopped
