# Wise Eat — HAProxy TLS front-ends (remplace Stunnel pour Mongo / Redis / Memcached)
# Install : sudo ./install.sh haproxy
# Certs : /etc/haproxy/certs/*.pem (fullchain+key) via sync-haproxy-certs.sh
#
# Public TLS → localhost plain :
#   27018 → 27017  Mongo primary   (crt db.wise-eat.com)
#   6381  → 6379   Redis cache
#   6382  → 6380   Redis BullMQ
#   6383  → 6371   Redis cache replica-1   (si cluster-b)
#   6384  → 6372   Redis cache replica-2
#   6385  → 6390   Redis BullMQ replica-1
#   6386  → 6391   Redis BullMQ replica-2
#   11212 → 11211  Memcached
# Stats UI (local) : 127.0.0.1:8404 — nginx → https://proxy.wise-eat.com

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 20000
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 10s
    timeout client  1h
    timeout server  1h
    timeout tunnel  1h
    retries 3

# --- Stats + Prometheus (localhost only ; public via nginx proxy.wise-eat.com) ---
frontend fe_stats
    bind 127.0.0.1:8404
    mode http
    option httplog
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    http-request redirect location /stats if { path / } !{ path_beg /metrics }

# --- MongoDB TLS (db.wise-eat.com) ---
frontend fe_mongo
    bind 0.0.0.0:27018 ssl crt /etc/haproxy/certs/db.wise-eat.com.pem
    bind :::27018 ssl crt /etc/haproxy/certs/db.wise-eat.com.pem v6only
    mode tcp
    default_backend be_mongo

backend be_mongo
    mode tcp
    option tcp-check
    server mongo-primary 127.0.0.1:27017 check inter 5s fall 3 rise 2

# --- Redis cache primary ---
frontend fe_redis_cache
    bind 0.0.0.0:6381 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6381 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_cache

backend be_redis_cache
    mode tcp
    option tcp-check
    server redis-cache 127.0.0.1:6379 check inter 5s fall 3 rise 2

# --- Redis BullMQ primary ---
frontend fe_redis_bullmq
    bind 0.0.0.0:6382 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6382 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_bullmq

backend be_redis_bullmq
    mode tcp
    option tcp-check
    server redis-bullmq 127.0.0.1:6380 check inter 5s fall 3 rise 2

# --- Memcached TLS ---
frontend fe_memcached
    bind 0.0.0.0:11212 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::11212 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_memcached

backend be_memcached
    mode tcp
    option tcp-check
    server memcached 127.0.0.1:11211 check inter 5s fall 3 rise 2

# --- Redis replicas (cluster-b) — activés si ports locaux écoutent ---
frontend fe_redis_cache_r1
    bind 0.0.0.0:6383 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6383 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_cache_r1

backend be_redis_cache_r1
    mode tcp
    option tcp-check
    server redis-cache-r1 127.0.0.1:6371 check inter 5s fall 3 rise 2

frontend fe_redis_cache_r2
    bind 0.0.0.0:6384 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6384 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_cache_r2

backend be_redis_cache_r2
    mode tcp
    option tcp-check
    server redis-cache-r2 127.0.0.1:6372 check inter 5s fall 3 rise 2

frontend fe_redis_bull_r1
    bind 0.0.0.0:6385 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6385 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_bull_r1

backend be_redis_bull_r1
    mode tcp
    option tcp-check
    server redis-bull-r1 127.0.0.1:6390 check inter 5s fall 3 rise 2

frontend fe_redis_bull_r2
    bind 0.0.0.0:6386 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem
    bind :::6386 ssl crt /etc/haproxy/certs/cache.wise-eat.com.pem v6only
    mode tcp
    default_backend be_redis_bull_r2

backend be_redis_bull_r2
    mode tcp
    option tcp-check
    server redis-bull-r2 127.0.0.1:6391 check inter 5s fall 3 rise 2
