# Wise Eat — EMQX : 1 primary + 2 réplicas (cluster static, toujours 3 conteneurs)
# Install : sudo ./install.sh emqx

name: wise-eat-emqx

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

x-emqx-env: &emqx-env
  EMQX_NODE__COOKIE: ${EMQX_ERLANG_COOKIE:?EMQX_ERLANG_COOKIE requis}
  EMQX_CLUSTER__DISCOVERY_STRATEGY: static
  EMQX_CLUSTER__STATIC__SEEDS: "[emqx@wise-eat-emqx-1,emqx@wise-eat-emqx-2,emqx@wise-eat-emqx-3]"
  EMQX_CLUSTER__AUTOHEAL: "true"
  EMQX_CLUSTER__AUTOHEAL__EVICT_AFTER: 30s
  EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
  EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?EMQX_DASHBOARD_PASSWORD requis}
  EMQX_AUTHENTICATION__1__MECHANISM: password_based
  EMQX_AUTHENTICATION__1__BACKEND: built_in_database
  EMQX_AUTHENTICATION__1__ENABLE: "true"
  EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
  EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__NAME: sha256
  EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__SALT_POSITION: suffix
  EMQX_LOG__CONSOLE__LEVEL: warning
  EMQX_PROMETHEUS__ENABLE: "true"
  # Collecteurs Erlang VM / Mnesia (désactivés par défaut — requis pour Grafana System)
  EMQX_PROMETHEUS__COLLECTORS__VM_MEMORY: enabled
  EMQX_PROMETHEUS__COLLECTORS__VM_SYSTEM_INFO: enabled
  EMQX_PROMETHEUS__COLLECTORS__VM_STATISTICS: enabled
  EMQX_PROMETHEUS__COLLECTORS__MNESIA: enabled

services:
  emqx-1:
    image: emqx/emqx:5.8.6
    container_name: wise-eat-emqx-1
    hostname: wise-eat-emqx-1
    networks:
      wise-eat-infra:
        aliases:
          - wise-eat-emqx-1
    environment:
      <<: *emqx-env
      EMQX_NODE__NAME: emqx@wise-eat-emqx-1
    ports:
      - "127.0.0.1:${EMQX_MQTT_PORT:-1883}:1883"
      - "127.0.0.1:${EMQX_WS_PORT:-8083}:8083"
      - "127.0.0.1:${EMQX_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - ./data-emqx-1:/opt/emqx/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18083/api/v5/status >/dev/null || /opt/emqx/bin/emqx ctl status"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 120s

  emqx-2:
    image: emqx/emqx:5.8.6
    container_name: wise-eat-emqx-2
    hostname: wise-eat-emqx-2
    networks:
      wise-eat-infra:
        aliases:
          - wise-eat-emqx-2
    depends_on:
      emqx-1:
        condition: service_started
    environment:
      <<: *emqx-env
      EMQX_NODE__NAME: emqx@wise-eat-emqx-2
    volumes:
      - ./data-emqx-2:/opt/emqx/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18083/api/v5/status >/dev/null || /opt/emqx/bin/emqx ctl status"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 120s

  emqx-3:
    image: emqx/emqx:5.8.6
    container_name: wise-eat-emqx-3
    hostname: wise-eat-emqx-3
    networks:
      wise-eat-infra:
        aliases:
          - wise-eat-emqx-3
    depends_on:
      emqx-1:
        condition: service_started
    environment:
      <<: *emqx-env
      EMQX_NODE__NAME: emqx@wise-eat-emqx-3
    volumes:
      - ./data-emqx-3:/opt/emqx/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:18083/api/v5/status >/dev/null || /opt/emqx/bin/emqx ctl status"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 120s
