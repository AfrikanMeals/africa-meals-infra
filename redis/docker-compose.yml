# Wise Eat — Redis : 1 primary + 2 réplicas (profile cluster-b)
# Install : sudo ./install.sh redis
# REDIS_CLUSTER_B_ENABLED=true dans .env.redis

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

x-redis-mem-cache: &redis-mem-cache
  mem_limit: ${REDIS_CACHE_MEM_LIMIT:-896m}
  memswap_limit: ${REDIS_CACHE_MEMSWAP_LIMIT:-1152m}

x-redis-mem-bull: &redis-mem-bull
  mem_limit: ${REDIS_BULL_MEM_LIMIT:-640m}
  memswap_limit: ${REDIS_BULL_MEMSWAP_LIMIT:-768m}

services:
  redis-cache:
    <<: *redis-mem-cache
    image: redis:7-alpine
    container_name: wise-eat-redis-cache
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 768mb
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6379:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:6379:6379"
    volumes:
      - ./data-cache:/data
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "wise-eat-cache",
          "--pass",
          "${CACHE_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-bullmq:
    <<: *redis-mem-bull
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6380:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:6380:6379"
    volumes:
      - ./data-bullmq:/data
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "wise-eat-bull",
          "--pass",
          "${BULL_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-cache-replica-1:
    <<: *redis-mem-cache
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-cache-replica-1
    networks:
      - wise-eat-infra
    depends_on:
      redis-cache:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${CACHE_REDIS_REPLICA_1_PORT:-6371}:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${CACHE_REDIS_REPLICA_1_PORT:-6371}:6379"
    volumes:
      - ./data-cache-replica-1:/data
      - ./cache-replica-1.generated.conf:/etc/redis/replica.conf:ro
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped

  redis-cache-replica-2:
    <<: *redis-mem-cache
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-cache-replica-2
    networks:
      - wise-eat-infra
    depends_on:
      redis-cache:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${CACHE_REDIS_REPLICA_2_PORT:-6372}:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${CACHE_REDIS_REPLICA_2_PORT:-6372}:6379"
    volumes:
      - ./data-cache-replica-2:/data
      - ./cache-replica-2.generated.conf:/etc/redis/replica.conf:ro
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped

  redis-bullmq-replica-1:
    <<: *redis-mem-bull
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq-replica-1
    networks:
      - wise-eat-infra
    depends_on:
      redis-bullmq:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${BULL_REDIS_REPLICA_1_PORT:-6390}:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${BULL_REDIS_REPLICA_1_PORT:-6390}:6379"
    volumes:
      - ./data-bullmq-replica-1:/data
      - ./bull-replica-1.generated.conf:/etc/redis/replica.conf:ro
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped

  redis-bullmq-replica-2:
    <<: *redis-mem-bull
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq-replica-2
    networks:
      - wise-eat-infra
    depends_on:
      redis-bullmq:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${BULL_REDIS_REPLICA_2_PORT:-6391}:6379"
      - "${K3S_CNI_GATEWAY:-10.42.0.1}:${BULL_REDIS_REPLICA_2_PORT:-6391}:6379"
    volumes:
      - ./data-bullmq-replica-2:/data
      - ./bull-replica-2.generated.conf:/etc/redis/replica.conf:ro
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
