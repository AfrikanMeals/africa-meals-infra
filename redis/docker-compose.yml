# Wise Eat — Redis dual-instance (cache + BullMQ)
# Install : sudo ./install.sh redis  (depuis la racine du dépôt)
# Permissions ACL : sudo ./install.sh permissions

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  redis-cache:
    image: redis:7-alpine
    container_name: wise-eat-redis-cache
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 1024mb
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data-cache:/data
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped

  redis-bullmq:
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ./data-bullmq:/data
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
