# Wise Eat — Redis (cluster A primary + cluster B réplicas optionnels)
# Install : sudo ./install.sh redis
# Cluster B (réplicas lecture, bascule manuelle apps) :
#   REDIS_CLUSTER_B_ENABLED=true dans .env.redis
#   docker compose --profile cluster-b up -d

networks:
  wise-eat-infra:
    name: wise-eat-infra
    external: true

services:
  # --- Cluster A (primary — apps par défaut) ---
  redis-cache:
    image: redis:7-alpine
    container_name: wise-eat-redis-cache
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 1024mb
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data-cache:/data
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "wise-eat-cache",
          "--pass",
          "${CACHE_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-bullmq:
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq
    networks:
      - wise-eat-infra
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --tcp-keepalive
      - "300"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ./data-bullmq:/data
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "wise-eat-bull",
          "--pass",
          "${BULL_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Cluster B (réplicas async — lecture / failover manuel) ---
  redis-cache-replica:
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-cache-replica
    networks:
      - wise-eat-infra
    depends_on:
      redis-cache:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${CACHE_REDIS_REPLICA_PORT:-6371}:6379"
    volumes:
      - ./data-cache-replica:/data
      - ./cache-replica.generated.conf:/etc/redis/replica.conf:ro
      - ./cache-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped

  redis-bullmq-replica:
    profiles: ["cluster-b"]
    image: redis:7-alpine
    container_name: wise-eat-redis-bullmq-replica
    networks:
      - wise-eat-infra
    depends_on:
      redis-bullmq:
        condition: service_healthy
    command:
      - redis-server
      - /etc/redis/replica.conf
    ports:
      - "127.0.0.1:${BULL_REDIS_REPLICA_PORT:-6390}:6379"
    volumes:
      - ./data-bullmq-replica:/data
      - ./bull-replica.generated.conf:/etc/redis/replica.conf:ro
      - ./bull-users.acl:/etc/redis/users.acl:ro
    restart: unless-stopped
