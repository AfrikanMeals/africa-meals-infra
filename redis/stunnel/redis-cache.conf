; TLS front-end cache Redis — Let's Encrypt via /etc/stunnel/certs/
[redis-cache]
accept = 6381
connect = 127.0.0.1:6379
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem

; IPv6 explicite (Linux bindv6only=1 : accept=6381 n’ouvre que 0.0.0.0)
[redis-cache-v6]
accept = [::]:6381
connect = 127.0.0.1:6379
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem
