; TLS front-end BullMQ Redis réplica 2 — Let's Encrypt via /etc/stunnel/certs/
[redis-bullmq-replica-2]
accept = 6386
connect = 127.0.0.1:6391
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem

[redis-bullmq-replica-2-v6]
accept = :::6386
connect = 127.0.0.1:6391
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem
