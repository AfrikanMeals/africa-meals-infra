; TLS front-end BullMQ Redis — Let's Encrypt via /etc/stunnel/certs/
[redis-bullmq]
accept = 6382
connect = 127.0.0.1:6380
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem

[redis-bullmq-v6]
accept = [::]:6382
connect = 127.0.0.1:6380
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem
