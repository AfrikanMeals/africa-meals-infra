; TLS front-end BullMQ Redis réplica 1 — Let's Encrypt via /etc/stunnel/certs/
[redis-bullmq-replica-1]
accept = 6385
connect = 127.0.0.1:6390
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem

[redis-bullmq-replica-1-v6]
accept = [::]:6385
connect = 127.0.0.1:6390
cert = /etc/stunnel/certs/fullchain.pem
key = /etc/stunnel/certs/privkey.pem
